<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vizualizacija vremenskih podataka pomoću CSS-only grafikona.">
    <title>MeteoStanica | Grafikon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_grafikon.css">
</head>
<body>

    <header>
        <h1>MeteoStanica 2026</h1>
        <nav aria-label="Glavni izbornik">
            <ul class="nav-links">
                <li><a href="index.html">Početna</a></li>
                <li class="dropdown">
                    <button class="dropbtn">Podaci ▾</button>
                    <ul class="dropdown-content">
                        <li><a href="grafikon.html">Grafički prikaz</a></li>
                        <li><a href="slike.html">Galerija slika</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <main class="chart-main">
        <section class="chart-container">
            <h2>Analiza padalina i temperature</h2>
            <p>Prikaz distribucije vremenskih uvjeta (Sunčano vs Kišno vs Oblačno).</p>

            <div class="pie-wrapper">
                <div class="pie-chart" aria-label="Kružni grafikon vremenskih uvjeta"></div>
                <ul class="chart-legend">
                    <li><span class="dot sun"></span> Sunčano (40%)</li>
                    <li><span class="dot rain"></span> Kišno (35%)</li>
                    <li><span class="dot cloud"></span> Oblačno (25%)</li>
                </ul>
            </div>

            <div class="histogram-wrapper">
                <div class="bar" style="--h: 40%; --color: var(--sun-color);" data-info="Sunčano: 40%" data-label="Sun"></div>
                <div class="bar" style="--h: 35%; --color: var(--rain-color);" data-info="Kišno: 35%" data-label="Rain"></div>
                <div class="bar" style="--h: 25%; --color: var(--cloud-color);" data-info="Oblačno: 25%" data-label="Cloud"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026. Web Programiranje. Sva prava pridržana.</p>
    </footer>

</body>
</html>
